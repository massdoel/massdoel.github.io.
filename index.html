<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Input Data Sampah - BPS</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, -apple-system, sans-serif; }
  body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
  .container { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }

  .header-section {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin-bottom: 8px;
    flex-wrap: wrap;
  }
  .logo-bps {
    width: 70px;
    height: 70px;
    object-fit: contain;
    flex-shrink: 0;
    background: white;
    padding: 4px;
    border-radius: 8px;
  }
  .header-text { text-align: left; }
  .header-text h1 { color: #2c5282; font-size: 24px; line-height: 1.2; margin: 0; }
  .header-text .institution { color: #718096; font-size: 13px; line-height: 1.4; margin-top: 4px; }
  @media (max-width: 480px) {
    .logo-bps { width: 55px; height: 55px; }
    .header-text h1 { font-size: 20px; }
    .header-text .institution { font-size: 12px; }
    .header-section { gap: 12px; }
  }

  .subtitle { text-align: center; color: #718096; margin-bottom: 24px; font-size: 14px; }
  .form-group { margin-bottom: 16px; }
  label { display: block; margin-bottom: 6px; font-weight: 600; color: #2d3748; font-size: 14px; }
  input, textarea { width: 100%; padding: 10px 12px; border: 1.5px solid #cbd5e0; border-radius: 8px; font-size: 14px; transition: border-color 0.2s; }
  input:focus, textarea:focus { outline: none; border-color: #667eea; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  button { width: 100%; padding: 14px; background: linear-gradient(135deg, #667eea, #764ba2); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 10px; transition: transform 0.2s; }
  button:hover:not(:disabled) { transform: translateY(-2px); }
  button:disabled { opacity: 0.6; cursor: not-allowed; }
  .alert { padding: 12px; border-radius: 8px; margin-top: 16px; display: none; font-size: 14px; }
  .alert.success { background: #c6f6d5; color: #22543d; display: block; }
  .alert.error { background: #fed7d7; color: #742a2a; display: block; }
  .preview { margin-top: 8px; max-width: 200px; border-radius: 8px; display: none; }
  .file-info { font-size: 12px; color: #718096; margin-top: 4px; }

  .footer {
    text-align: center;
    margin-top: 20px;
    padding-top: 16px;
    border-top: 1px solid #e2e8f0;
    color: #a0aec0;
    font-size: 12px;
  }
</style>
</head>
<body>
<div class="container">
  <div class="header-section">
    <img 
      src="https://bpsrw.dinaslhdki.id/images/logo.png" 
      alt="Logo BPS" 
      class="logo-bps"
      onerror="this.style.display='none'">
    <div class="header-text">
      <h1>Input Data Sampah Pilah</h1>
      <p class="institution">Bidang Pengelolaan Sampah RT/RW<br>Kelurahan Kota Bambu Utara</p>
    </div>
  </div>
  <p class="subtitle">Data otomatis tersimpan & rapi di Google Sheets</p>

  <form id="formSampah">
    <div class="form-group">
      <label>Foto Sampah *</label>
      <input type="file" name="foto" accept="image/*" id="inputFoto" required>
      <div class="file-info">Maks. 2MB (JPG/PNG). Foto akan diupload ke Google Drive.</div>
      <img id="preview" class="preview" alt="preview">
    </div>
    <div class="form-group">
      <label>Nama *</label>
      <input type="text" name="nama" maxlength="100" required>
    </div>
    <div class="form-group">
      <label>Alamat *</label>
      <textarea name="alamat" rows="2" maxlength="255" required></textarea>
    </div>

    <!-- === KOLOM RT & RW (BARU) === -->
    <div class="grid-2">
      <div class="form-group">
        <label>RT *</label>
        <input type="text" name="rt" maxlength="5" pattern="[0-9]{1,5}" inputmode="numeric" placeholder="Contoh: 005" required>
      </div>
      <div class="form-group">
        <label>RW *</label>
        <input type="text" name="rw" maxlength="5" pattern="[0-9]{1,5}" inputmode="numeric" placeholder="Contoh: 003" required>
      </div>
    </div>
    <!-- === END RT & RW === -->

    <div class="grid-2">
      <div class="form-group">
        <label>Organik (kg)</label>
        <input type="number" name="organik" step="0.01" min="0" value="0" required>
      </div>
      <div class="form-group">
        <label>Anorganik (kg)</label>
        <input type="number" name="anorganik" step="0.01" min="0" value="0" required>
      </div>
      <div class="form-group">
        <label>B3 (kg)</label>
        <input type="number" name="b3" step="0.01" min="0" value="0" required>
      </div>
      <div class="form-group">
        <label>Residu (kg)</label>
        <input type="number" name="residu" step="0.01" min="0" value="0" required>
      </div>
    </div>
    <button type="submit" id="btnSubmit">Kirim Data</button>
    <div id="alert" class="alert"></div>
  </form>

  <div class="footer">
    © 2026 Bidang Pengelolaan Sampah RT/RW - Kelurahan Kota Bambu Utara
  </div>
</div>

<script>
  // ⚠️ GANTI DENGAN URL WEB APP ANDA
  const APPS_SCRIPT_URL = 'https://shttps://script.google.com/macros/s/AKfycbyY5afZUI0vYKZPbghyLWqLyGxBjWB88yE68CZV2OlFf97UaiKcPS3mRa6w98MGKac9/execcript.google.com/macros/s/XXXXXXXXXXXXX/exec';
  
  const form = document.getElementById('formSampah');
  const alertBox = document.getElementById('alert');
  const preview = document.getElementById('preview');
  const inputFoto = document.getElementById('inputFoto');
  
  inputFoto.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    
    if (file.size > 2 * 1024 * 1024) {
      showAlert('✗ Ukuran foto maksimal 2MB', 'error');
      inputFoto.value = '';
      preview.style.display = 'none';
      return;
    }
    
    preview.src = URL.createObjectURL(file);
    preview.style.display = 'block';
  });
  
  function fileToBase64(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }
  
  function showAlert(msg, type) {
    alertBox.className = `alert ${type}`;
    alertBox.textContent = msg;
  }
  
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('btnSubmit');
    btn.disabled = true;
    btn.textContent = 'Mengirim...';
    alertBox.className = 'alert';
    
    // Validasi client-side RT/RW (hanya angka)
    const rt = form.rt.value.trim();
    const rw = form.rw.value.trim();
    if (!/^\d{1,5}$/.test(rt)) {
      showAlert('✗ RT harus angka 1-5 digit', 'error');
      btn.disabled = false; btn.textContent = 'Kirim Data';
      return;
    }
    if (!/^\d{1,5}$/.test(rw)) {
      showAlert('✗ RW harus angka 1-5 digit', 'error');
      btn.disabled = false; btn.textContent = 'Kirim Data';
      return;
    }
    
    try {
      const file = inputFoto.files[0];
      const fotoBase64 = await fileToBase64(file);
      
      const payload = {
        nama: form.nama.value,
        alamat: form.alamat.value,
        rt: rt,
        rw: rw,
        organik: form.organik.value,
        anorganik: form.anorganik.value,
        b3: form.b3.value,
        residu: form.residu.value,
        foto: fotoBase64
      };
      
      const res = await fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        mode: 'cors',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify(payload)
      });
      
      const data = await res.json();
      
      if (data.success) {
        showAlert('✓ Data berhasil disimpan ke Google Sheets!', 'success');
        form.reset();
        preview.style.display = 'none';
      } else {
        throw new Error(data.message || 'Gagal menyimpan data');
      }
    } catch (err) {
      showAlert('✗ ' + err.message, 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Kirim Data';
    }
  });
</script>
</body>
</html>
